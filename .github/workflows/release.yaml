name: Release

on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
          - name: macos-arm64
            os: macos-14
          - name: windows-x86_64
            os: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
          cache-workspaces: . -> target

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Run Python tests
        run: uv run pytest

      - name: Run upstream Rust tests
        run: cargo test --manifest-path ext/dss-codec/dss-codec/Cargo.toml --locked

      - name: Build source distribution
        if: runner.os == 'Linux'
        run: uv build --sdist

      - name: Build Linux wheel
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          manylinux: "2014"
          args: --release --out dist -i python3.10

      - name: Build non-Linux wheels
        if: runner.os != 'Linux'
        run: uv build --wheel

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.name }}
          path: dist/*

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write

    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
