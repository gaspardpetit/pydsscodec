name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python-tests:
    name: Python tests / py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
          cache-workspaces: . -> target

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Run Python tests
        run: uv run pytest

  platform-build:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.10"

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
          cache-workspaces: . -> target

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Run Python tests
        run: uv run pytest

      - name: Run upstream Rust tests
        run: cargo test --manifest-path ext/dss-codec/dss-codec/Cargo.toml --locked -- --test-threads=1

      - name: Build source distribution
        if: runner.os == 'Linux'
        run: uv build --sdist

      - name: Build Linux wheel
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          manylinux: "2014"
          args: --release --out dist -i python3.10

      - name: Build non-Linux wheels
        if: runner.os != 'Linux'
        run: uv build --wheel
